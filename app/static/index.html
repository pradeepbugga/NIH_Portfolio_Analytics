<!DOCTYPE html>
<html>

<head>
    <title>NIH Grant Search</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>

    <h2>NIH Grant Search</h2>

    <input id="query" placeholder="Enter search query" size="40" />
    <button onclick="runSearch()">Search</button>

    <div id="status"></div>
    <div id="plot"></div>

    <script>
        async function runSearch() {
            const q = document.getElementById("query").value;
            document.getElementById("status").innerText = "Searching...";

            const resp = await fetch(`/search?query=${encodeURIComponent(q)}`);
            const data = await resp.json();

            document.getElementById("status").innerText =
                `Found ${data.records.length} grant-years`;

            // Example: funding over time
            const years = {};
            data.records.forEach(r => {
                years[r.fiscal_year] = (years[r.fiscal_year] || 0) + r.amount;
            });

            Plotly.newPlot("plot", [{
                x: Object.keys(years),
                y: Object.values(years),
                type: "bar"
            }], {
                title: "Funding over time"
            });
        }
    </script>

</body>

</html>
