<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The NIH Audit</title>
    <link rel="stylesheet" href="/static/css/styles_v12.css?v=1.0.3">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="landing">

    <div class="center-container">
        <div class="logo">The NIH Audit</div>

        <div class="home-options">

            <div class="search-divider-top top-divider">
                <div class="divider-text">
                    <span class="divider-search">EXPLORE NIH PORTFOLIO</span>
                </div>
            </div>

            <div class="home-cards-grid">

                <a href="/portfolio" class="home-card">
                    <div class="home-card-icon-block">
                        <i data-lucide="bar-chart-3"></i>
                    </div>
                    <div class="home-card-content-block">
                        <div class="home-card-title"> Explore<br> Entire Portfolio</div>
                    </div>
                </a>

                <div class="home-card-control">
                    <div class="home-card-icon-block">
                        <i data-lucide="building-2"></i>
                    </div>
                    <div class="home-card-content-block">
                        <div class="home-card-title">Explore by Agency</div>
                        <div class="home-card-dropdown-wrapper">
                            <select id="landing-agency-selector" class="home-card-select-engine"
                                onchange="routeToAgency(this.value)">
                                <option value="" disabled selected hidden>Select an IC...</option>
                                {% if agencies %}
                                {% for agency in agencies %}
                                <option value="{{ agency['funding_code'] }}">
                                    {{ agency['agency_ic'] }} ({{ agency['abbreviation'] }})
                                </option>
                                {% endfor %}
                                {% else %}
                                <option value="" disabled>Error: No Agencies Found on Server</option>
                                {% endif %}
                            </select>
                        </div>
                    </div>
                </div>

                <div class="home-card-control spatial-search-card">
                    <div class="home-card-icon-block">
                        <i data-lucide="layers"></i>
                    </div>
                    <div class="home-card-content-block">
                        <div class="home-card-title">Explore by Activity Codes</div>
                        <div class="home-card-description">
                            <span class="text-desktop">Enter up to 5 codes (separated by commas)</span>
                            <span class="text-mobile">Enter up to 5 codes</span>
                        </div>
                        <div class="activity-code-search-box-wrapper">
                            <input type="text" id="activity-codes-input" placeholder="e.g., R01, R43"
                                onkeydown="if(event.key === 'Enter') executeActivityCodeSearch()" />
                            <button onclick="executeActivityCodeSearch()">Go</button>
                        </div>
                    </div>
                </div>

            </div>
            <div class="search-divider">
                <div class="divider-line"></div>
                <div class="divider-text">
                    <span class="divider-or">OR</span>
                    <span class="divider-search">SEARCH BELOW</span>
                </div>
                <div class="divider-line"></div>
            </div>

            {% include 'partials/search_bar.html' %}

        </div>

        <footer>
            <a href="/contact_us">Contact Us</a>
        </footer>
    </div>

    <div id="errorModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 99999;"
        onclick="if(event.target.id === 'errorModal') closeErrorModal()">
        <div
            style="background: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);">
            <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 12px;">
                <div style="font-size: 18px; font-weight: 700; color: #12253d;">Search Error</div>
            </div>
            <div style="font-size: 14px; color: #475569; line-height: 1.5; margin-bottom: 20px; word-break: break-word;"
                id="modal-error-text"></div>
            <div style="display: flex; justify-content: flex-end;">
                <button onclick="closeErrorModal()"
                    style="background-color: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer;">Dismiss</button>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
    <script src="/static/js/script.js"></script>
    <script>
        function routeToAgency(fundingCode) {
            if (!fundingCode) return;
            window.location.href = `/agency/${fundingCode.toLowerCase()}`;
        }

        const allowedActivityCodesCache = new Set({{ valid_activity_codes | tojson }});

        function openErrorModal(message) {
            const modal = document.getElementById("errorModal");
            const textField = document.getElementById("modal-error-text");
            if (modal && textField) {
                textField.innerText = message;
                modal.style.display = "flex";
            }
        }

        function closeErrorModal() {
            const modal = document.getElementById("errorModal");
            if (modal) modal.style.display = "none";
        }

        function executeActivityCodeSearch() {
            const inputElement = document.getElementById("activity-codes-input");
            if (!inputElement) return;

            const rawValue = inputElement.value;
            const codes = rawValue.split(",")
                .map(code => code.trim().toUpperCase())
                .filter(code => code.length > 0);

            if (codes.length === 0) {
                openErrorModal("Please enter at least one activity code.");
                return;
            }

            if (codes.length > 5) {
                openErrorModal("You can enter a maximum of 5 activity codes at a time.");
                return;
            }

            const nihCodeRegex = /^[A-Z0-9]{3}$/;
            const structuralInvalidCodes = [];

            for (const code of codes) {
                if (!nihCodeRegex.test(code)) {
                    structuralInvalidCodes.push(code);
                }
            }

            if (structuralInvalidCodes.length > 0) {
                openErrorModal(`Invalid format detected: ${structuralInvalidCodes.join(", ")}. Activity codes must be exactly 3 alphanumeric characters (e.g., R43, DP2).`);
                return;
            }

            if (allowedActivityCodesCache && allowedActivityCodesCache.size > 0) {
                const unrecognizedCodes = [];
                for (const code of codes) {
                    if (!allowedActivityCodesCache.has(code)) {
                        unrecognizedCodes.push(code);
                    }
                }
                if (unrecognizedCodes.length > 0) {
                    openErrorModal(`Unrecognized Activity Code(s): ${unrecognizedCodes.join(", ")}. Please cross-reference with known NIH funding mechanisms.`);
                    return;
                }
            }

            const queryStringParam = codes.join(",");
            window.location.href = `/activity_codes?codes=${encodeURIComponent(queryStringParam)}`;
        }
    </script>
</body>

</html>
