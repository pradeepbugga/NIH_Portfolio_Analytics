<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>The NIH Audit</title>
    <link rel="stylesheet" href="/static/css/styles_v12.css?v=1.0.1"">
    <script src=" https://unpkg.com/lucide@latest">
    </script>

</head>

<body class="landing">

    <div class="center-container">
        <div class="logo">The NIH Audit</div>

        <div class="home-options">

            <div class="search-divider-top top-divider">

                <div class="divider-text">

                    <span class="divider-search">
                        EXPLORE NIH PORTFOLIO
                    </span>

                </div>

            </div>
            <div class="home-cards-grid">

                <a href="/portfolio" class="home-card">

                    <div class="home-card-icon-block">
                        <i data-lucide="bar-chart-3"></i>
                    </div>

                    <div class="home-card-content-block">
                        <div class="home-card-title"> Explore<br> Entire Portfolio</div>
                        <div class="home-card-description">

                        </div>
                    </div>


                </a>

                <div class="home-card-control">
                    <div class="home-card-icon-block">
                        <i data-lucide="building-2"></i>
                    </div>
                    <div class="home-card-content-block">
                        <div class="home-card-title">Explore by Agency</div>

                        <div class="home-card-dropdown-wrapper">
                            <select id="landing-agency-selector" class="home-card-select-engine"
                                onchange="routeToAgency(this.value)">
                                <option value="" disabled selected hidden>Select an NIH Institute (IC)...</option>

                                {% if agencies %}
                                {% for agency in agencies %}
                                <option value="{{ agency['funding_code'] }}">
                                    {{ agency['agency_ic'] }} ({{ agency['abbreviation'] }})
                                </option>
                                {% endfor %}
                                {% else %}
                                <option value="" disabled>Error: No Agencies Found on Server</option>
                                {% endif %}

                            </select>
                        </div>
                    </div>

                </div>

            </div>
            <div class="home-card-control spatial-search-card">
                <div class="home-card-icon-block">
                    <i data-lucide="building-2"></i>
                </div>
                <div class="home-card-content-block" style="width: 100%;">
                    <div class="home-card-title">Explore by Activity Codes</div>
                    <div class="home-card-description" style="margin-bottom: 8px;">
                        Enter up to 5 IC/Activity codes (comma-separated)
                    </div>

                    <div class="activity-code-search-box-wrapper" style="display: flex; gap: 8px; width: 100%;">
                        <input type="text" id="activity-codes-input" placeholder="e.g., R01, R43"
                            style="flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none;"
                            onkeydown="if(event.key === 'Enter') executeActivityCodeSearch()" />
                        <button onclick="executeActivityCodeSearch()"
                            style="padding: 8px 16px; background-color: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px;">
                            Go
                        </button>
                    </div>
                    <div id="activity-code-error-message"
                        style="color: #ef4444; font-size: 12px; margin-top: 6px; display: none; font-weight: bold;">
                    </div>
                </div>
            </div>
        </div>
        <div class="search-divider">
            <div class="divider-line"></div>

            <div class="divider-text">
                <span class="divider-or">OR</span>
                <span class="divider-search">SEARCH BELOW</span>
            </div>

            <div class="divider-line"></div>
        </div>
        {% include 'partials/search_bar.html' %}

    </div>
    <footer>
        <a href="/contact_us">Contact Us</a>
    </footer>

    <script>lucide.createIcons(); </script>
    <script src="/static/js/script.js"></script>
    <script>
        function routeToAgency(fundingCode) {
            if (!fundingCode) return;

            // Redirects out cleanly to your master dynamic unified workspace!
            // Example target format: /agency/ca or /agency/ai
            window.location.href = `/agency/${fundingCode.toLowerCase()}`;
        }
        function executeActivityCodeSearch() {
            const inputElement = document.getElementById("activity-codes-input");
            const errorElement = document.getElementById("activity-code-error-message");

            // Hide previous error
            errorElement.style.display = "none";
            errorElement.innerText = "";

            if (!inputElement) return;

            // 1. Sanitize input: strip whitespace, upper-case, filter empty strings
            const rawValue = inputElement.value;
            const codes = rawValue.split(",")
                .map(code => code.trim().toUpperCase())
                .filter(code => code.length > 0);

            // 2. Validate count bounds (1 to 5 codes)
            if (codes.length === 0) {
                errorElement.innerText = "Please enter at least one agency or activity code.";
                errorElement.style.display = "block";
                return;
            }

            if (codes.length > 5) {
                errorElement.innerText = "You can enter a maximum of 5 codes at a time.";
                errorElement.style.display = "block";
                return;
            }

            // 3. Structural Validation (Strictly 3 alphanumeric characters, e.g., R41, CA1, DP2)
            const nihCodeRegex = /^[A-Z0-9]{3}$/;
            const invalidCodes = [];

            for (const code of codes) {
                if (!nihCodeRegex.test(code)) {
                    invalidCodes.push(code);
                }
            }

            if (invalidCodes.length > 0) {
                errorElement.innerText = `Invalid code format: ${invalidCodes.join(", ")}. NIH codes must be exactly 3 characters (e.g., R43, U13).`;
                errorElement.style.display = "block";
                return;
            }

            // 4. Pass downstream to unified endpoint via query parameters
            const queryStringParam = codes.join(",");
            window.location.href = `/activity_codes?codes=${encodeURIComponent(queryStringParam)}`;
        }

    </script>

</body>

</html>
