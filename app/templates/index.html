<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>The NIH Audit</title>
    <link rel="stylesheet" href="/static/css/styles_v12?v=1.0.1.css">
    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="landing">

    <div class="center-container">
        <div class="logo">The NIH Audit</div>

        <div class="home-options">

            <div class="search-divider-top top-divider">

                <div class="divider-text">

                    <span class="divider-search">
                        EXPLORE NIH PORTFOLIO
                    </span>

                </div>

            </div>
            <div class="home-cards-grid">

                <a href="/portfolio" class="home-card">

                    <div class="home-card-icon-block">
                        <i data-lucide="bar-chart-3"></i>
                    </div>

                    <div class="home-card-content-block">
                        <div class="home-card-title"> Explore Categories</div>
                        <div class="home-card-description">
                            See breakdown of NIH funding <br>categorized by grant intent
                        </div>
                    </div>


                </a>

                <div class="home-card-control">
                    <div class="home-card-icon-block">
                        <i data-lucide="building-2"></i>
                    </div>
                    <div class="home-card-content-block">
                        <div class="home-card-title">Explore by Agency</div>

                        <div class="home-card-dropdown-wrapper">
                            <select id="landing-agency-selector" class="home-card-select-engine"
                                onchange="routeToAgency(this.value)">
                                <option value="" disabled selected hidden>Select an NIH Institute (IC)...</option>

                                {% if agencies %}
                                {% for agency in agencies %}
                                <option value="{{ agency['funding_code'] }}">
                                    {{ agency['agency_ic'] }} ({{ agency['abbreviation'] }})
                                </option>
                                {% endfor %}
                                {% else %}
                                <option value="" disabled>Error: No Agencies Found on Server</option>
                                {% endif %}

                            </select>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <div class="search-divider">
            <div class="divider-line"></div>

            <div class="divider-text">
                <span class="divider-or">OR</span>
                <span class="divider-search">SEARCH BELOW</span>
            </div>

            <div class="divider-line"></div>
        </div>
        {% include 'partials/search_bar.html' %}

    </div>

    <script>lucide.createIcons(); </script>
    <script src="/static/js/script.js"></script>
    <script>
        function routeToAgency(fundingCode) {
            if (!fundingCode) return;

            // Redirects out cleanly to your master dynamic unified workspace!
            // Example target format: /agency/ca or /agency/ai
            window.location.href = `/agency/${fundingCode.toLowerCase()}`;
        }

    </script>

</body>

</html>
