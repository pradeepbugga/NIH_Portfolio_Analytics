<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Explore NIH Portfolio</title>

    <link rel="stylesheet" href="/static/css/styles_v12.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">


    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="portfolio-page">

    <div class="portfolio-top-header">
        <div class="header-content">

            <div class="logo">
                <a href="/" style="text-decoration: none; color: inherit;">The NIH Audit</a>
            </div>
        </div>
    </div>

    <div class="portfolio-header-layout">

        <div class="portfolio-header-left">

            <div class="portfolio-title">
                explore NIH portfolio
            </div>

            <div class="subtitle-container">

                <div class="portfolio-subtitle">
                    Navigate NIH funding across convenient categories.
                </div>
                <a href="/categories" class="category-link">
                    See category definitions
                </a>
            </div>


        </div>

        <div class="year-selector-container">

            <label class="year-selector-label">
                Fiscal Year
            </label>

            <select class="year-selector">
                {% for year in range(2025, 1984, -1) %}
                <option value="{{ year }}" {% if year !=2025 %}disabled{% endif %} {% if year==2025 %}selected{% endif
                    %}>
                    {{ year }}
                </option>
                {% endfor %}
            </select>

        </div>


    </div>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <div class="portfolio-container">
        <div class="portfolio-split-layout">

            <div class="portfolio-left-pane">

                <div id="portfolio-funding-stat-container">
                    <div id="portfolio-funding-amount"></div>
                    <div class="portfolio-funding-caption">2025 Funding</div>
                </div>

            </div>

            <div class="portfolio-right-pane">

                <div id="categoryChart"></div>

            </div>

        </div>
    </div>
    <div class="pulse-container">
        <svg viewBox="0 0 800 100" preserveAspectRatio="none" class="pulse-svg">
            <defs>
                <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="transparent" />
                    <stop offset="50%" stop-color="#a5b4fc" />
                    <stop offset="100%" stop-color="transparent" />
                </linearGradient>
            </defs>
            <path d="M0,50 L380,50 L385,35 L390,65 L395,20 L400,80 L405,40 L410,60 L415,50 L800,50"
                class="pulse-back" />
            <path d="M0,50 L380,50 L385,35 L390,65 L395,20 L400,80 L405,40 L410,60 L415,50 L800,50"
                class="pulse-glow" />
        </svg>
    </div>

    <div id="grant-results-container">

        <div id="grant-results-title"></div>
        <div id="grant-results-header">


            <div id="grant-results-filters"></div>

            <div id="filter-stats-container" style="margin-bottom: 15px; font-family: 'Inter', sans-serif;">
                <span id="filter-count"></span>
                <span id="filter-total-funding"></span>
            </div>

        </div>
        <div id="grant-search-container">
            <form id="grant-search-form" class="grant-search-wrapper">
                <input type="text" id="grant-search-input" placeholder="Semantic filter within results...">
                <button type="submit" class="grant-filter-button">
                    <i data-lucide="beaker"></i>
                </button>
            </form>
        </div>

        <div id="loading-message" class="loading-status-card" style="display: none;">
            <div class="spinner-small"></div>
            <div class="status-text">
                <strong>Processing Search...</strong>
                <span>(this may take a moment).</span>
            </div>
        </div>

        <div id="grant-results-layout">

            <div id="grant-results-list"></div>

            <div id="grant-detail-pane">

                <div id="grant-detail-placeholder">
                    Select a grant to view abstract
                </div>

            </div>

        </div>

        <div id="pagination-controls"
            style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px;">
            <button id="prev-btn" class="nav-btn">← Previous</button>
            <span id="page-info">Page 1 of X</span>
            <button id="next-btn" class="nav-btn">Next →</button>
        </div>
    </div>
    <script>

        let activeCategory = null;
        let allGrants = [];
        let currentPage = 1;
        const itemsPerPage = 100;
        let activeYear = 2025;
        let currentFilters = {
            year: "2025",
            category: "",
            queries: []
        };
        const categoryMap = {

            "Mechanistic / Basic Science": "mechanistic",

            "Therapeutic": "therapeutic",

            "Diagnostic": "diagnostic",

            "Research Tool": "research_tool",

            "Clinical / Health Systems": "clinical",

            "Research Infrastructure": "infrastructure",

            "Education": "education",

            "Observational Epidemiology": "obs_ep"
        };

        async function loadCategoryChart(year = 2025) {

            const response = await fetch(
                `/api/portfolio/categories?year=${year}`
            );

            const data = await response.json();
            const sortedEntries = Object.entries(data).sort((a, b) => b[1] - a[1]);

            const labels = sortedEntries.map(entry => entry[0]);
            const values = sortedEntries.map(entry => entry[1]);

            const total = values.reduce((a, b) => a + b, 0);
            const displayValues = values.map(v => v / 1000000000);

            const grantContainer = document.getElementById('grant-results-container');


            const chartDiv = document.getElementById("categoryChart");
            const formattedFunding = new Intl.NumberFormat(
                'en-US',
                {
                    style: 'currency',
                    currency: 'USD',
                    notation: 'compact',
                    maximumFractionDigits: 1
                }
            ).format(total);

            document.getElementById(
                "portfolio-funding-amount"
            ).innerText = formattedFunding;






            Plotly.newPlot(

                "categoryChart",

                [{
                    x: displayValues,
                    y: labels,

                    type: "bar",
                    orientation: "h",

                    marker: {
                        color: displayValues,
                        colorscale: [
                            [0, '#a5b4fc'], // Lightest bar color (a soft slate blue)
                            [1, '#12253d']  // Darkest bar color (matches your sidebar)
                        ],
                        reversescale: false,
                        line: {
                            color: '#12253d',
                            width: 1
                        }
                    },
                    hovertemplate: "$%{x:.1f}B<extra></extra>"
                }],


                {
                    title: {
                        text: 'NIH Funding Distribution by Category',
                        font: {
                            family: "'Inter', sans-serif",
                            size: 25,
                            color: '#12253d' // Matches your sidebar
                        },
                        xref: 'paper',
                        x: 0, // Aligns title to the left edge of the chart area
                        y: 1.1, // Moves it slightly above the bars
                        pad: { b: 20 } // Adds some bottom padding
                    },
                    hovermode: 'closest',
                    hoverdistance: 5,
                    hoverlabel: {
                        bgcolor: "white", // Match your sidebar/dark blue
                        font: {
                            color: "#12253d",
                            family: "Inter, sans-serif",
                            size: 20
                        },
                        bordercolor: "#12253d",
                        align: "left"
                    },
                    annotations: [
                        // 1. The Text Label
                        {
                            x: 0.97,
                            y: 0.05,
                            xref: 'paper',
                            yref: 'paper',
                            text: "Click on a bar to see grants!",
                            showarrow: false,
                            xanchor: 'right',
                            layer: 'above',
                            font: { size: 15, color: '#12253d' }
                        }

                    ],
                    images: [{
                        // This is a small SVG of a curved arrow pointing top-left
                        source: "/static/images/curved-thin-arrow-icon.svg",
                        xref: "paper",
                        yref: "paper",
                        x: 0.9,        // Position in the bottom right
                        y: 0.1,
                        sizex: 0.15,    // Scale of the arrow
                        sizey: 0.15,
                        xanchor: "right",
                        yanchor: "bottom",
                        layer: "above"
                    }],

                    paper_bgcolor: "rgba(0,0,0,0)",
                    plot_bgcolor: "rgba(0,0,0,0)",

                    font: {
                        family: "'Inter', sans-serif",
                        size: 14,
                        color: "#243b53"
                    },

                    margin: {
                        t: 40,
                        l: 250,
                        r: 30,
                        b: 80
                    },

                    xaxis: {
                        title: {
                            text: "Total Funding (Billions USD)",
                            font: {
                                size: 18,
                                color: "#12253d",
                                weight: 700
                            },
                            standoff: 30
                        },
                        tickfont: {
                            size: 16,
                            color: "#243b53",
                            weight: 700

                        },
                        showgrid: false,
                        gridcolor: "rgba(36,59,83,0.08)",
                        zeroline: false,
                        ticks: "",
                        showline: false,


                    },

                    yaxis: {

                        autorange: "reversed",
                        showgrid: false,
                        tickfont: {
                            size: 16,
                            color: "#12253d",
                            weight: 700
                        },

                        ticks: "",

                        showline: false,
                        ticksuffix: "    "
                    }
                },

                {
                    responsive: true,
                    displayModeBar: false
                }
            );
            chartDiv.on("plotly_click", async function (data) {
                // 1. Get the category from the chart
                const displayCategory = data.points[0].y;
                const categoryCode = categoryMap[displayCategory];

                console.log("Chart clicked label:", displayCategory);
                console.log("Mapped category code:", categoryCode);

                // 2. Validation
                if (!categoryCode) {
                    alert(`Error: The category "${displayCategory}" is not recognized.`);
                    return;
                }

                // 3. Update the GLOBAL state
                // We update the category but LEAVE the query alone 
                // This allows "Successive Filtering" (Searching within the new category)
                currentFilters.category = categoryCode;
                activeCategory = categoryCode; // Keeping your existing global for compatibility

                // 4. Reset UI elements
                // Optional: If you want clicking the chart to CLEAR the search bar, keep this:
                // document.getElementById("grant-search-input").value = ""; 
                // currentFilters.query = "";

                // 5. Reveal and Scroll
                grantContainer.classList.add('show');
                grantContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

                // 6. Fetch data using the new unified logic
                // Instead of loadCategoryGrants, we call applyFilters which uses currentFilters
                applyFilters(displayCategory);
            });
            chartDiv.on('plotly_hover', function (data) {
                // Change the "glass" layer to a hand
                const dragLayer = chartDiv.querySelector('.nsewdrag');
                if (dragLayer) dragLayer.style.setProperty('cursor', 'pointer', 'important');
            });

            chartDiv.on('plotly_unhover', function (data) {
                // Change it back to a normal arrow
                const dragLayer = chartDiv.querySelector('.nsewdrag');
                if (dragLayer) dragLayer.style.setProperty('cursor', 'default', 'important');
            });
        }
        async function applyFilters() {
            // 1. DECLARE the variables from your global state
            const loadingEl = document.getElementById("loading-message");
            if (loadingEl) loadingEl.style.display = "flex";
            const category = currentFilters.category || "";
            const queriesArray = currentFilters.queries || [];
            const year = "2025";




            // Get ID of latest query entered
            const latestQuery = queriesArray[queriesArray.length - 1] || "";

            // Collect IDs of current results to "lock" the next search into this set
            const validIds = allGrants
                .map(g => g.grant_id)
                .filter(id => id != null && id !== "");

            const currentIds = validIds.join(",");


            const categoryCode = currentFilters.category || "";

            const humanName = Object.keys(categoryMap).find(key => categoryMap[key] === categoryCode) || categoryCode;


            let url;

            // Choose the endpoint based on presence of a query
            if (latestQuery === "") {
                // Use the standard endpoint that returns ALL grants for a category
                url = `/api/portfolio/grants?year=${year}&category=${category}`;
            } else {
                // Use the search endpoint for semantic filtering
                const params = new URLSearchParams({
                    year: year,
                    category: category,
                    query: latestQuery,
                    existing_ids: currentIds // within the OLD results
                });
                url = `/api/portfolio/grants/search?${params.toString()}`;
            }

            console.log("Fetching finalized URL:", url);
            // This will now look like: .../search?year=2025&category=education&query=
            console.log("Fetching URL:", url); // Debugging: Check if this looks correct

            try {
                const response = await fetch(url);


                if (!response.ok) {
                    const errorBody = await response.json();
                    console.error("Error details:", errorBody);
                    return;
                }
                const data = await response.json();

                allGrants = data.grants || [];
                currentPage = 1; // Always reset to page 1 on new filter

                // Update the UI
                renderFilters(humanName);
                updateTotals(allGrants);
                renderPage(1);
            } catch (err) {
                console.error("Filtering failed:", err);
            } finally {
                document.getElementById("loading-message").style.display = "none";
            }
        }
        function cleanAbstract(text) {

            if (!text) return "";

            return text

                // remove carriage returns
                .replace(/\r/g, "")

                // collapse ALL single newlines into spaces
                .replace(/\n/g, " ")

                // collapse repeated spaces
                .replace(/\s+/g, " ")

                // restore paragraph breaks after periods followed by capital letters
                .replace(/\. ([A-Z])/g, ".\n\n$1")

                .trim();
        }
        async function loadCategoryGrants(displayName, category) {
            const response = await fetch(`/api/portfolio/grants?year=2025&category=${category}`);
            const data = await response.json();

            // store full list
            // Fix: If data.grants doesn't exist, default to an empty array []
            allGrants = data.grants || [];
            currentPage = 1;

            // update totals
            updateTotals(allGrants);

            renderHeader(displayName);
            updateTotals(allGrants); // Now .length won't crash
            renderPage(1);
        }
        function renderFilters(category) {
            const container = document.getElementById("grant-results-filters");
            container.innerHTML = ""; // Clear existing

            const titleEl = document.getElementById("grant-results-title");
            if (titleEl) {
                titleEl.style.display = "block";
                titleEl.innerText = "grant results"; // Ensures lowercase/uppercase consistency
            }


            // Year Pill (Static)
            addPill(container, `Year: 2025`);

            // Category Pill (Removable)
            if (category) {
                addPill(container, `Category: ${category}`, () => {
                    currentFilters.category = "";
                    applyFilters();
                });
            }

            // Query Pill (Removable)
            if (currentFilters.queries.length > 0) {
                currentFilters.queries.forEach((q, index) => {
                    addPill(container, `Search: ${q}`, () => {
                        currentFilters.queries.splice(index, 1); // Remove this query
                        applyFilters();
                    });
                });
            }



        }
        function addPill(target, text, onRemove = null) {
            const pill = document.createElement("div");
            pill.className = "filter-pill";
            pill.innerHTML = text + (onRemove ? ` <span class="remove-pill" style="cursor:pointer; margin-left:8px;">×</span>` : "");
            if (onRemove) pill.onclick = onRemove;
            target.appendChild(pill);
        }
        function renderHeader(categoryName) {
            console.log("renderHeader received category:", categoryName);

            const titleEl = document.getElementById("grant-results-title");

            titleEl.style.display = "block";
            titleEl.innerText = "Grant Results";

            document.getElementById("grant-results-filters").innerHTML = `
            <div class="filter-pill">Fiscal Year: 2025</div>
            <div class="filter-pill">Category: ${categoryName}</div>
        `;
        }
        function updateTotals(grants) {
            const count = grants.length;
            const totalDollars = grants.reduce((sum, grant) => sum + (grant.funding || 0), 0);

            const formattedTotal = new Intl.NumberFormat(
                'en-US',
                {
                    style: 'currency',
                    currency: 'USD',
                    notation: 'compact',
                    maximumFractionDigits: 1
                }
            ).format(totalDollars);

            document.getElementById("filter-count").innerText = `${count} Grants Found`;
            document.getElementById("filter-total-funding").innerText = `Total Funding: ${formattedTotal}`;

        }
        function renderPage(page) {
            const container = document.getElementById("grant-results-list");
            container.innerHTML = "";

            //calculate start and end indices
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;

            // Slice master list to only 100
            const pageItems = allGrants.slice(start, end);

            pageItems.forEach(grant => {

                const funding = new Intl.NumberFormat(
                    'en-US',
                    {
                        style: 'currency',
                        currency: 'USD',
                        notation: 'compact',
                        maximumFractionDigits: 1
                    }
                ).format(grant.funding);

                const card = document.createElement("div");

                card.className = "grant-card";

                card.onclick = () => {
                    showGrantDetail(grant);
                };

                card.innerHTML = `

                    <div class="grant-title">
                        ${grant.title}
            </div>

                    <div class="grant-meta">

                        <div>
                            ${grant.organization || "Unknown Organization"}
                        </div>

                        <div>
                            PI: ${grant.pi || "Unknown"}
                        </div>

                        <div class="grant-funding">
                            ${funding}
                        </div>

                    </div>
                `;

                container.appendChild(card);
            });
            updatePaginationControls();
        }
        function updatePaginationControls() {
            const totalPages = Math.ceil(allGrants.length / itemsPerPage);
            const pageInfo = document.getElementById("page-info");

            if (pageInfo) {
                pageInfo.innerText = `Page ${currentPage} of ${totalPages}`;
            }

            document.getElementById("prev-btn").disabled = (currentPage == 1);
            document.getElementById("next-btn").disabled = (currentPage === totalPages || totalPages === 0);

        }
        // Event Listeners for the arrows
        document.getElementById("prev-btn").onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
                document.getElementById("grant-results-container").scrollIntoView({ behavior: 'smooth' });
            }
        };

        document.getElementById("next-btn").onclick = () => {
            const totalPages = allGrants ? Math.ceil(allGrants.length / itemsPerPage) : 0;
            if (currentPage < totalPages) {
                currentPage++;
                renderPage(currentPage);
                document.getElementById("grant-results-container").scrollIntoView({ behavior: 'smooth' });
            }
        };

        function showGrantDetail(grant) {

            const funding = new Intl.NumberFormat(
                'en-US',
                {
                    style: 'currency',
                    currency: 'USD',
                    notation: 'compact',
                    maximumFractionDigits: 1
                }
            ).format(grant.funding);

            document.getElementById(
                "grant-detail-pane"
            ).innerHTML = `

                    <div class="grant-detail-title">
                        ${grant.title}
        </div>



                    <div class="grant-detail-abstract">

                        ${cleanAbstract(grant.abstract) || "No abstract available."}

                    </div>
                `;
        }
        window.addEventListener("DOMContentLoaded", () => {
            const searchInput = document.getElementById("grant-search-input");
            const searchForm = document.getElementById("grant-search-form");



            searchForm.addEventListener("submit", function (event) {

                event.preventDefault();

                // 1. Check if a category is selected (Successive requirement)
                if (!currentFilters.category) {
                    alert("Please select a category from the chart first.");
                    return;
                }

                // 2. Update the GLOBAL state with the search term
                const queryValue = searchInput.value.trim();
                if (queryValue) {
                    // Add the new word to our array
                    currentFilters.queries.push(queryValue);
                    // Clear the input box so user can type the NEXT word
                    searchInput.value = "";
                    applyFilters();
                }
            });
        });

        loadCategoryChart();

    </script>
    <script>lucide.createIcons(); </script>
    <script src="/static/js/script.js"></script>

</body>

</html>
