<form action="https://api.nihaudit.com/search" method="get" class="search-form" id="search-form">
    <input type="text" name="query" placeholder="Enter a disease, drug, or technique..." autofocus required />
    <button type="submit" class="search-button">
        <i data-lucide="beaker"></i>
    </button>
</form>

<div id="loading-message" style="display: none; margin-top: 20px; font-size: 18px;">
    Please wait 2–5 minutes while we process your search...
</div>

<script>
    document.getElementById("search-form").addEventListener("submit", function () {
        document.getElementById("loading-message").style.display = "block";
    });
</script>
